<html>
<head>
	<title>Widget GRIST Carte Facile</title>
	<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
	<!-- Importation des bibliothèques MapLibre GL JS -->
	<link href="https://unpkg.com/maplibre-gl@^5.5.0/dist/maplibre-gl.css" rel="stylesheet" />
	<script src="https://unpkg.com/maplibre-gl@^5.5.0/dist/maplibre-gl.js"></script>
	<!-- Importation des bibliothèques Carte Facile -->
	<!-- 0.9.0 includes SearchControl -->
	<link href="https://unpkg.com/carte-facile@^0.9.0/dist/carte-facile.css" rel="stylesheet" />
  	<script src="https://unpkg.com/carte-facile@^0.9.0/dist/carte-facile.js"></script> 
	<script src="script.js"></script>
	<link rel="stylesheet" href="style.css"/>
</head>
<body>
	<!-- Conteneur HTML qui accueillera la carte -->
	<div id="map"></div>

	<!-- Fenêtre modal de gestion des  paramètres du widget -->
	<div id="widgetParameters" class="widget-dialog-modal">
		<div id="widgetParametersContent" class="widget-dialog-content">
			<div id="widgetParametersHeader" class="widget-dialog-header">Paramètres</div>
			<label>
				Rayon d'aggrégation
				<input type="number" id="clusterRadius" placeholder="0">
			</label>
			<div class="widget-dialog-footer">
				<button id="cancelSettings" class="btn btn-secondary">Annuler</button>
				<button id="saveSettings" class="btn btn-primary">Enregistrer</button>
			</div>
		</div>
	</div>

	<!-- Fenêtre modal d'ajout d'une ligne -->
	<div id="widgetEditRecord" class="widget-dialog-modal">
		<div id="widgetEditRecordContent" class="widget-dialog-content">
			<div id="widgetEditRecordHeader" class="widget-dialog-header">Ajout/Mise à jour d'une ligne</div>
			<label id="editRecordLabelRecord" for="editRecordSelect">Ligne à modifier (le cas échéant)</label>
			<select id="editRecordSelect">
				<!-- options To be managed in the widget -->
			</select>
			<label id="editRecordLabelTitle" for="editRecordTitle">Libellé</label>
			<input id="editRecordTitle" name="Titre" type="text" placeholder="A renseigner">
			<label id="editRecordLabelLatitude" for="editRecordlat">Latitude</label>
			<input id="editRecordLat" name="Latitude" type="number" placeholder="">
			<label id="editRecordLabelLongitude" for="editRecordLon">Longitude</label>
			<input id="editRecordLon" name="Longitude" type="number" placeholder="">
			<div class="widget-dialog-footer">
				<button id="cancelEditRecord" class="btn btn-secondary">Annuler</button>
				<button id="addRecord" class="btn btn-primary">Ajouter</button>
				<button id="updateRecord" class="btn btn-primary" disabled>Actualiser</button>
				<button id="deleteRecord" class="btn btn-primary" disabled>Supprimer</button>
			</div>
		</div>
	</div>

	<!-- Context Menu -->
	<div id="contextMenu">
		<ul>
			<li id="contextMenuAdd">Nouvelle ligne</li>
			<li id="contextMenuUpdate">Edition de la ligne</li>
			<li id="contextMenuShow">Où suis-je ?</li>
		</ul>
	</div>
</body>
</html>
