<html>
<head>
	<title>Widget GRIST Carte Facile</title>
	<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
	<!-- Importation des bibliothèques MapLibre GL JS -->
	<link href="https://unpkg.com/maplibre-gl@^5.5.0/dist/maplibre-gl.css" rel="stylesheet" />
	<script src="https://unpkg.com/maplibre-gl@^5.5.0/dist/maplibre-gl.js"></script>
	<!-- Importation des bibliothèques Carte Facile -->
	<link href="https://unpkg.com/carte-facile@^0.8.3/dist/carte-facile.css" rel="stylesheet" />
	<script src="https://unpkg.com/carte-facile@^0.8.3/dist/carte-facile.js"></script> 
	<script src="script.js"></script>
	<link rel="stylesheet" href="style.css"/>
</head>
<body>
   <!-- Conteneur HTML qui accueillera la carte -->
  <div id="map"></div>

  <!-- Fenêtre modal de gestion des  paramètres du widget -->
  <div id="widgetParameters" class="widget-dialog-modal">
    <div id="widgetParametersContent" class="widget-dialog-content">
      <div id="widgetParametersHeader" class="widget-dialog-header">Paramètres</div>
      <label>
        Rayon d'aggrégation
        <input type="number" id="clusterRadius" placeholder="0">
      </label>
    	<div class="widget-dialog-footer">
        <button id="cancelSettings" class="btn btn-secondary">Annuler</button>
        <button id="saveSettings" class="btn btn-primary">Enregistrer</button>
      </div>
    </div>
  </div>

	<!-- Fenêtre modal d'ajout d'une ligne -->
  <div id="widgetNewRow" class="widget-dialog-modal">
    <div id="widgetNewRowContent" class="widget-dialog-content">
      <div id="widgetNewRowHeader" class="widget-dialog-header">Nouvelle ligne...</div>
      <label>
       Libellé
        <input type="text" id="newRowTitle" placeholder="Libellé de l'objet pointé">
      </label>
      <label>
       Latitude
        <input type="number" id="newRowLat" placeholder="">
      </label>
      <label>
       Longitude
        <input type="number" id="newRowLon" placeholder="">
      </label>
      <div class="widget-dialog-footer">
        <button id="cancelNewRow" class="btn btn-secondary">Annuler</button>
        <button id="saveNewRow" class="btn btn-primary">Enregistrer</button>
      </div>
    </div>
  </div>
	
	<!-- Function to make the dialog boxes dragable -->
	<script
		// Reusable function to make any modal draggable
		function makeDraggable(modalId) {
  		const content = document.getElementById(`${modalId}Content`);
  		const header = document.getElementById(`${modalId}Header`);

  		let offsetX = 0, offsetY = 0, isDragging = false;

  		header.addEventListener("mousedown", function(e) {
    		isDragging = true;
				content.style.transform = ""; // remove centering transform
    		offsetX = e.clientX - content.offsetLeft;
    		offsetY = e.clientY - content.offsetTop;
    		document.addEventListener("mousemove", onMouseMove);
    		document.addEventListener("mouseup", onMouseUp);
  		});

  		function onMouseMove(e) {
    		if (!isDragging) return;
    		content.style.left = (e.clientX - offsetX) + "px";
    		content.style.top = (e.clientY - offsetY) + "px";
  		}

  		function onMouseUp() {
    		isDragging = false;
    		document.removeEventListener("mousemove", onMouseMove);
    		document.removeEventListener("mouseup", onMouseUp);
  		}
		}

		// Apply to both modals
		document.addEventListener("DOMContentLoaded", function() {
			makeDraggable("widgetParameters");
			makeDraggable("widgetNewRow");		
		});
	</script>  // End of dragable script

</body>
</html>
