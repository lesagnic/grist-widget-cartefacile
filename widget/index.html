<html>
<head>
	<title>Widget GRIST Carte Facile</title>
	<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
	<!-- Importation des bibliothèques MapLibre GL JS -->
	<link href="https://unpkg.com/maplibre-gl@^5.5.0/dist/maplibre-gl.css" rel="stylesheet" />
	<script src="https://unpkg.com/maplibre-gl@^5.5.0/dist/maplibre-gl.js"></script>
	<!-- Importation des bibliothèques Carte Facile -->
	<link href="https://unpkg.com/carte-facile@^0.8.3/dist/carte-facile.css" rel="stylesheet" />
	<script src="https://unpkg.com/carte-facile@^0.8.3/dist/carte-facile.js"></script> 
	<script src="script.js"></script>
	<link rel="stylesheet" href="style.css"/>
</head>
<body>
   <!-- Conteneur HTML qui accueillera la carte -->
  <div id="map"></div>

  <!-- Fenêtre modal de gestion des  paramètres du widget -->
  <div id="widgetParameters" class="widget-parameters-modal">
    <div class="widget-parameters-content">
      <div class="widget-parameters-header">Paramètres</div>
      <label>
        Rayon d'aggrégation
        <input type="number" id="clusterRadius" placeholder="0">
      </label>
       <div class="widget-parameters-footer">
        <button id="cancelSettings" class="btn btn-secondary">Annuler</button>
        <button id="saveSettings" class="btn btn-primary">Enregistrer</button>
      </div>
    </div>
  </div>
</body>

</html>
